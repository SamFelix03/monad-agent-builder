[profile.default]
src = "."
out = "out"
libs = ["lib"]
exclude = ["lib"]
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

# Monad Testnet — https://docs.monad.xyz/developer-essentials/testnets
eth-rpc-url = "https://testnet-rpc.monad.xyz"
chain_id = 10143
